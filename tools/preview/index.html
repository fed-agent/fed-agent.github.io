<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FedAgent — local preview</title>
    <style>
      :root { --bar: 52px; --brand: #2a2f6c; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: #eef0f6;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif; }
      .bar { height: var(--bar); display: flex; align-items: center; gap: .75rem;
        padding: 0 1rem; background: #fff; border-bottom: 1px solid #e2e4ee;
        position: sticky; top: 0; z-index: 2; }
      .bar .title { font-weight: 700; color: var(--brand); margin-right: auto;
        font-size: .95rem; letter-spacing: -0.01em; }
      .bar .title small { font-weight: 500; color: #8a8fa3; margin-left: .5rem; }
      .seg { display: inline-flex; border: 1px solid #d7dae8; border-radius: 8px; overflow: hidden; }
      .seg button { appearance: none; border: 0; background: #fff; color: #444;
        padding: .42rem .9rem; font-size: .85rem; font-weight: 600; cursor: pointer;
        border-left: 1px solid #e7e9f2; }
      .seg button:first-child { border-left: 0; }
      .seg button.active { background: var(--brand); color: #fff; }
      .dims { font-size: .8rem; color: #8a8fa3; min-width: 56px; text-align: right; }
      .stage { height: calc(100% - var(--bar)); display: flex; justify-content: center;
        align-items: flex-start; padding: 1.25rem; overflow: auto; }
      .frame { width: 100%; max-width: 100%; height: 100%; background: #fff;
        transition: width .25s ease, max-width .25s ease; }
      .stage.device .frame { height: calc(100% - 1rem); border: 1px solid #dfe2ee;
        border-radius: 22px; box-shadow: 0 10px 40px rgba(20, 22, 50, .18); overflow: hidden; }
      iframe { display: block; width: 100%; height: 100%; border: 0; border-radius: inherit; background: #fff; }
    </style>
  </head>
  <body>
    <div class="bar">
      <div class="title">FedAgent <small>local preview</small></div>
      <div class="seg" id="seg">
        <button data-w="full" class="active">Full</button>
        <button data-w="820">Tablet</button>
        <button data-w="390">Phone</button>
      </div>
      <div class="dims" id="dims">100%</div>
    </div>
    <div class="stage" id="stage">
      <div class="frame" id="frame">
        <iframe id="site" src="/" title="site preview"></iframe>
      </div>
    </div>
    <script>
      const widths = { full: null, '820': 820, '390': 390 };
      const seg = document.getElementById('seg');
      const stage = document.getElementById('stage');
      const frame = document.getElementById('frame');
      const dims = document.getElementById('dims');
      seg.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;
        [...seg.children].forEach((b) => b.classList.toggle('active', b === btn));
        const w = widths[btn.dataset.w];
        if (w == null) {
          frame.style.width = '100%';
          frame.style.maxWidth = '100%';
          stage.classList.remove('device');
          dims.textContent = '100%';
        } else {
          frame.style.width = w + 'px';
          frame.style.maxWidth = w + 'px';
          stage.classList.add('device');
          dims.textContent = w + 'px';
        }
      });
    </script>
  </body>
</html>
